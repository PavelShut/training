<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Набивание мячика</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: linear-gradient(135deg, #87CEEB 0%, #98D8E8 100%);
            font-family: Arial, sans-serif;
        }
        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            font-size: 18px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            z-index: 100;
        }
    </style>
</head>
<body>
    <div id="info">
        Кликни по мячику!<br>
        <span id="score">Очки: 0</span>
    </div>

    <!-- Библиотеки -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/cannon@0.6.2/build/cannon.min.js"></script>

    <script>
        // Инициализация сцены
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        // Cannon.js мир
        const world = new CANNON.World();
        world.gravity.set(0, -9.82, 0);
        world.broadphase = new CANNON.NaiveBroadphase();

        // Освещение
        const ambientLight = new THREE.AmbientLight(0x404040, 0.4);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(10, 20, 5);
        directionalLight.castShadow = true;
        directionalLight.shadow.mapSize.width = 2048;
        directionalLight.shadow.mapSize.height = 2048;
        scene.add(directionalLight);

        // Пол
        const floorGeometry = new THREE.PlaneGeometry(20, 20);
        const floorMaterial = new THREE.MeshLambertMaterial({ color: 0x90EE90 });
        const floorMesh = new THREE.Mesh(floorGeometry, floorMaterial);
        floorMesh.rotation.x = -Math.PI / 2;
        floorMesh.receiveShadow = true;
        scene.add(floorMesh);

        const floorBody = new CANNON.Body({ mass: 0 });
        floorBody.addShape(new CANNON.Plane());
        floorBody.quaternion.setFromAxisAngle(new CANNON.Vec3(1, 0, 0), -Math.PI / 2);
        world.addBody(floorBody);

        // Мячик
        const ballRadius = 0.5;
        const ballGeometry = new THREE.SphereGeometry(ballRadius, 32, 32);
        const ballMaterial = new THREE.MeshPhongMaterial({ 
            color: 0xff4444,
            shininess: 100
        });
        const ballMesh = new THREE.Mesh(ballGeometry, ballMaterial);
        ballMesh.castShadow = true;
        ballMesh.position.y = 2;
        scene.add(ballMesh);

        const ballShape = new CANNON.Sphere(ballRadius);
        const ballBody = new CANNON.Body({ mass: 1 });
        ballBody.addShape(ballShape);
        ballBody.position.set(0, 2, 0);
        world.addBody(ballBody);

        // Переменные игры
        let score = 0;
        const scoreElement = document.getElementById('score');

        // Raycaster для кликов
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        // Обработка клика мыши
        function onMouseClick(event) {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);

            const intersects = raycaster.intersectObject(ballMesh);
            if (intersects.length > 0) {
                // Вычисляем силу удара по позиции клика
                const hitPoint = intersects[0].point;
                const center = ballMesh.position;
                
                // Вектор от центра мяча к точке клика
                const hitVector = new THREE.Vector3()
                    .subVectors(hitPoint, center)
                    .normalize();
                
                // Сила удара зависит от высоты клика и расстояния от центра
                const power = Math.max(5, 15 - hitVector.y * 10);
                const impulse = new CANNON.Vec3(
                    hitVector.x * power,
                    Math.max(8, 12 - hitVector.y * 5),
                    hitVector.z * power
                );

                // Применяем импульс
                ballBody.applyImpulse(impulse, ballBody.position);

                // Очки за точный удар
                score += Math.floor(power);
                scoreElement.textContent = `Очки: ${score}`;
            }
        }

        window.addEventListener('click', onMouseClick);

        // Позиция камеры
        camera.position.set(0, 5, 10);
        camera.lookAt(0, 2, 0);

        // Анимация
        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);

            const deltaTime = clock.getDelta();
            world.step(1/60, deltaTime, 3);

            // Синхронизация мяча
            ballMesh.position.copy(ballBody.position);
            ballMesh.quaternion.copy(ballBody.quaternion);

            // Мячик не улетел за пол
            if (ballBody.position.y < -1) {
                ballBody.position.set(0, 2, 0);
                ballBody.velocity.set(0, 0, 0);
                ballBody.angularVelocity.set(0, 0, 0);
                ballMesh.position.y = 2;
            }

            renderer.render(scene, camera);
        }

        // Адаптация под размер окна
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
