name: Cartographer

on:
  push:
    paths:
      - 'src/**'
      - 'tools/**'
      - 'index.html'
      - 'package.json'
      - '.github/workflows/cartographer.yml'
  pull_request:
    paths:
      - 'src/**'
      - 'tools/**'
      - 'index.html'
      - 'package.json'
  workflow_dispatch:

jobs:
  run-cartographer:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies (if package.json exists)
        run: |
          if [ -f package.json ]; then npm ci || npm install || true; fi

      - name: Run Cartographer (default: analyze)
        run: |
          node tools/cartographer.js analyze --out docs --depth 4 || true

      - name: Commit outputs (if changed)
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.commit == 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs || true
          if ! git diff --staged --quiet; then
            git commit -m "chore: update cartographer outputs [ci skip]" || true
            git push origin HEAD:${{ github.ref_name }}
          else
            echo "No changes"
          fi
