name: Copilot Skill
on:
  workflow_dispatch:
    inputs:
      task:
        description: 'Task to run (map, summary, analyze)'
        required: true
        default: analyze
      depth:
        description: 'Traversal depth (number)'
        required: false
        default: '4'
      commit:
        description: 'Commit generated outputs'
        required: false
        default: 'false'

jobs:
  run-skill:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Run Copilot Skill
        run: |
          node tools/copilot-skill.js ${{ github.event.inputs.task }} --out docs --depth ${{ github.event.inputs.depth }} $([[ "${{ github.event.inputs.commit }}" == "true" ]] && echo --commit || true)

      - name: Commit outputs (if changed)
        if: ${{ github.event.inputs.commit == 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs || true
          if ! git diff --staged --quiet; then
            git commit -m "chore: update copilot-skill outputs [ci skip]" || true
            git push origin HEAD:${{ github.ref_name }}
          else
            echo "No changes"
          fi
